name: release
on:
  push:
    branches: [ main ]
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  build-and-release:
    name: build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Build docs
        run: '[[ -d public ]] || npm run build:docs'

      - name: Publish pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
